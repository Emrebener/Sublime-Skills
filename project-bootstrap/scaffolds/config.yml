# SDD configuration. Pipeline skills consult this file as the single source
# of truth for paths and per-stage behavior. Generated by the
# bootstrapping-project skill; edit freely.

# ── Paths ────────────────────────────────────────────────────────────
# Where the pipeline writes its artifacts.
#
# handoff_dir may be either repo-relative (default; the handoff is committed
# alongside the run) OR an absolute / tilde-expanded path (e.g.
# /home/user/sdd-handoffs/ or ~/notes/sdd/) to write handoffs OUTSIDE the
# repo. Absolute paths are not committed; the coordinator records the
# resolved path in state.json and tells the user where it landed.
paths:
  spec_dir: docs/specs          # spec.md, plan.md, state.json live under spec_dir/NNN-name/
  adr_dir: docs/adr             # ADRs as NNNN-kebab.md
  handoff_dir: docs/handoff     # handoffs as YYYY-MM-DD-kebab.md (or absolute path)

# ── Context files ───────────────────────────────────────────────────
# Where project convention files live. Each is a single path (or null if
# the project does not have that artifact). The discovery script reads
# these and returns the path back to skills that consult them. There is
# no auto-fallback — null means "this project doesn't have one."
context:
  constitution_path: docs/constitution.md       # project-wide principles (MUST/SHALL rules)
  architecture_path: docs/ARCHITECTURE.md       # system structure overview
  glossary_path: docs/GLOSSARY.md               # canonical domain vocabulary
  domain_path: docs/DOMAIN.md                   # conceptual entities and relationships
  design_path: docs/DESIGN.md                   # visual design system (colors, type, spacing, components)

# ── Branching (Stage 12) ────────────────────────────────────────────
branching:
  # Pattern for derived feature branch names; {short-name} substituted.
  # Used by the `choosing-feature-branch` skill (Stage 12) when offering
  # to create a feature branch. Bug-fix runs (state.work_type == "fix")
  # use `fix/{short-name}` automatically.
  branch_pattern: "feat/{short-name}"

# ── Grill (Stage 4) ─────────────────────────────────────────────────
grill:
  # Soft cap on questions per grill session. Hard ceiling is 20 even with
  # an override.
  question_cap: 10

# ── Memory file maintenance (Stage 15) ──────────────────────────────
# Stage 15 is user-prompted at runtime (yes/no, default yes). These
# values configure WHICH file is maintained and the size budget — they
# don't toggle the stage itself.
memory_file:
  # Explicit memory file path. null means: auto-detect at repo root in
  # this order: CLAUDE.md, AGENTS.md, GEMINI.md, .agents.md (first match
  # wins). If neither config nor auto-detect finds a path, Stage 15 is
  # skipped without prompting.
  path: null

  # Soft cap on memory file size in characters. The skill warns at 90%
  # of this value and refuses to push past 100% (must prune first).
  # 40000 is a widely-recommended ceiling for agent memory files.
  character_limit: 40000
