<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Products Fixture</title></head>
<body>
  <h1>Product Catalog</h1>
  <div id="products"><!-- populated by JS --></div>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var items = [
        { name: 'Wireless Keyboard',   price: '$49.99' },
        { name: 'Ergonomic Mouse',     price: '$34.99' },
        { name: 'USB-C Hub',           price: '$29.99' },
        { name: 'Mechanical Numpad',   price: '$59.99' },
        { name: 'Monitor Light Bar',   price: '$39.99' }
      ];
      var container = document.getElementById('products');
      items.forEach(function (item) {
        var row = document.createElement('div');
        row.className = 'product';
        row.innerHTML =
          '<span class="name">' + item.name + '</span>' +
          '<span class="price">' + item.price + '</span>';
        container.appendChild(row);
      });
    });
  </script>
</body>
</html>
